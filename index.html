<!DOCTYPE html>
<html lang="pt-br">

<head>

</head>

<body>

        <header>

                <li class="li-redes-sociais">

                        </a>
                    </li>
                    <li class="li-redes-sociais df-center">
                        <a href="#" target="_blank" class=" df-center">
                            <img src="img/discord.png" alt="Logo Discord" class="img-ul-redes-sociais">

                        </a>
                    </li>
                </ul>
